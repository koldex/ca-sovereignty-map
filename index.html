<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAmap Nordic & Baltic — TLS Certificate Authority Sovereignty Map</title>
  <meta name="description" content="Interactive map showing which certificate authorities control HTTPS for Nordic and Baltic municipal websites, and their geopolitical kill-switch risk.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/map.css">
</head>
<body>
  <div class="page-layout">
    <nav class="nav">
      <span class="nav-title">🗺 CAmap Nordic & Baltic</span>
      <a href="index.html" class="nav-link active">Map</a>
      <a href="methodology.html" class="nav-link">Methodology</a>
      <a href="https://github.com/koldex/ca-sovereignty-map" class="nav-link" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <div id="map"></div>
    <div id="info-bar">
      <div id="info-bar-content">
        <span class="text-muted text-small">Loading map data…</span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/map-shared.js"></script>
  <script>
    'use strict';
    // Colour for polygons present in the TopoJSON boundaries but absent
    // from data.json (no domain was resolved for the municipality).
    // Defined here — not in map-shared.js — to avoid cross-<script> scope issues.
    const NO_DATA_COLOR = '#c0cad4'; // blue-grey, distinct from classified-unknown greys

    const DATA_URL = 'data.min.json';
    const TOPOJSON_URL = 'nordic-municipalities.topojson';
    let map, muniLayer, mapData;

    async function main() {
      try {
        map = initMap('map');
      } catch (err) {
        document.getElementById('info-bar-content').innerHTML =
          `<span class="text-muted">⚠ Map init failed: ${escapeHtml(err.message)}</span>`;
        console.error('initMap failed:', err);
        return;
      }
      addLegend(map);
      setupInfoBar('info-bar');

      try {
        const [data, topo] = await Promise.all([
          fetchMapData(DATA_URL),
          fetchTopoJson(TOPOJSON_URL),
        ]);
        mapData = data;
        renderMunicipalities(topo, data.municipalities);
        renderStats(data);
      } catch (err) {
        const el = document.getElementById('info-bar-content');
        if (el) el.innerHTML =
          `<span class="text-muted">⚠ Failed to load map data: ${escapeHtml(err.message)}</span>`;
        console.error('Data load failed:', err);
      }
    }

    function renderMunicipalities(topo, municipalities) {
      const geoJson = topojson.feature(topo, topo.objects.municipalities);
      muniLayer = L.geoJSON(geoJson, {
        style: feature => {
          const id = feature.properties.id || feature.properties.municipal_code;
          const muni = municipalities[id];
          // NO_DATA_COLOR: clearly distinct from the neutral greys used for
          // classified-unknown municipalities (#eeeeee / #aaaaaa range).
          // 171 polygons have boundary data but no scan entry.
          return {
            fillColor: muni ? getMuniColor(muni) : NO_DATA_COLOR,
            fillOpacity: 0.75, color: '#fff', weight: 0.5,
          };
        },
        onEachFeature: (feature, layer) => {
          const id = feature.properties.id || feature.properties.municipal_code;
          const muni = municipalities[id];
          const name = feature.properties.name || id || '';
          const country = feature.properties.country || '';

          layer.on('click', () => {
            if (muni) {
              updateInfoBar(muni);
              layer.bindPopup(buildPopup(muni), { maxWidth: 400 }).openPopup();
            } else {
              // No scan data — polygon exists in boundaries but had no
              // resolvable domain (municipality too small, recently merged, etc.)
              layer.bindPopup(
                `<div>
                  <div class="popup-header">
                    <div>
                      <div class="popup-name">${escapeHtml(name)}</div>
                      <div class="popup-country">${escapeHtml(country)}</div>
                    </div>
                    <span class="badge badge-unknown">No data</span>
                  </div>
                  <div class="popup-notice notice-nodata">
                    No domain data — this municipality could not be matched
                    to a resolvable web domain. It may have recently merged,
                    use a non-standard domain pattern, or have no public
                    website. Add a correction to
                    <a href="https://github.com/koldex/ca-sovereignty-map/blob/main/overrides.json"
                       target="_blank" rel="noopener">overrides.json</a>.
                  </div>
                </div>`,
                { maxWidth: 380 }
              ).openPopup();
            }
          });
          layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.95, weight: 1.5, color: '#555' }));
          layer.on('mouseout', () => muniLayer.resetStyle(layer));
        },
      }).addTo(map);
    }

    function renderStats(data) {
      const total = data.total || 0;
      const counts = data.counts || {};
      const usCount = counts['us-controlled'] || 0;
      const usPct = total > 0 ? (usCount / total * 100).toFixed(0) : 0;
      document.getElementById('info-bar-content').innerHTML = `
        <div><span class="text-muted text-small">Click a municipality to see details</span></div>
        <div class="text-small text-muted">
          ${total.toLocaleString('en')} municipalities scanned ·
          US-controlled: <strong>${usPct}%</strong> ·
          Updated: ${data.generated ? new Date(data.generated).toLocaleDateString('en-GB') : '–'}
        </div>`;
    }

    window.onColorSchemeChange = function () {
      if (!muniLayer || !mapData) return;
      muniLayer.eachLayer(layer => {
        const id = layer.feature.properties.id || layer.feature.properties.municipal_code;
        const muni = mapData.municipalities[id];
        if (muni) layer.setStyle({ fillColor: getMuniColor(muni) });
      });
    };

    main();
  </script>
</body>
</html>
