name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'methodology.html'
      - 'css/**'
      - 'js/**'
      - 'data.min.json'
      - 'nordic-municipalities.topojson'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Serve from repo root (index.html, data.min.json, css/, js/)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
