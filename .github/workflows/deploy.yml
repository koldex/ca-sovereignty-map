name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'methodology.html'
      - 'css/**'
      - 'js/**'
      - 'data.min.json'
      - 'nordic-municipalities.topojson'

  workflow_dispatch:

# Minimal permissions: read source + write pages token only
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Opt into Node.js 24 now to avoid forced migration noise in June 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # SHA-pinned to actions/checkout@v4
      # https://github.com/actions/checkout/releases/tag/v4
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # SHA-pinned to actions/configure-pages@v5
      # https://github.com/actions/configure-pages/releases/tag/v5
      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      # SHA-pinned to actions/upload-pages-artifact@v3
      # https://github.com/actions/upload-pages-artifact/releases/tag/v3
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: '.'   # Serve from repo root (index.html, data.min.json, css/, js/)

      # SHA-pinned to actions/deploy-pages@v4
      # https://github.com/actions/deploy-pages/releases/tag/v4
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
