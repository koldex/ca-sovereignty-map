name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal GITHUB_TOKEN scope — only read access needed for CI
permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.13

      - run: uv sync --group dev

      # Ruff check — output GitHub annotations directly in the PR diff
      - name: ruff check
        run: uv run ruff check src tests --output-format=github

      # Ruff format — fail if any file is not formatted
      - name: ruff format
        run: uv run ruff format src tests --check

  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.13

      - run: uv sync --group dev

      - name: pytest with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
