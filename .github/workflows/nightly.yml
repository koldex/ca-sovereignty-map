name: Nightly CA Scan

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 04:00 Finnish time
  workflow_dispatch:       # Allow manual trigger

concurrency:
  group: nightly
  cancel-in-progress: false  # Never cancel an in-progress scan

# Opt into Node.js 24 now to avoid forced migration noise in June 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write  # Required to commit updated data.json

    steps:
      # SHA-pinned to actions/checkout@v4
      # https://github.com/actions/checkout/releases/tag/v4
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned to astral-sh/setup-uv@v5
      # https://github.com/astral-sh/setup-uv/releases/tag/v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.13

      - run: uv sync

      # Phase 2: Scan certificates (municipality_domains.json must exist)
      #
      # --skip-ct: REQUIRED for CI. crt.sh rate-limits GitHub Actions IPs;
      #   without this flag the scan rate degrades from ~6 dom/s to ~2 dom/s
      #   as stamina retries pile up, causing Swedish/Norwegian servers to time
      #   out that succeed on a local developer connection.
      #   CT data is supplementary — leaf cert + intermediate + CAA signals are
      #   sufficient for CA classification.
      #
      # --concurrency 50: Safe with --skip-ct (no crt.sh bottleneck).
      #   The nightly runner has 2 vCPU / 7 GB RAM; asyncio SSL is I/O-bound
      #   so higher concurrency improves throughput without CPU pressure.
      - name: Scan TLS certificates
        run: uv run scan-certs --skip-ct --concurrency 50

      - name: Run analysis report
        run: uv run analyze
        continue-on-error: true

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Commit updated scan data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.min.json
          git diff --staged --quiet || git commit -m "Update CA scan data [${{ steps.date.outputs.date }}]"
          git push
