name: Nightly CA Scan

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 04:00 Finnish time
  workflow_dispatch:       # Allow manual trigger

concurrency:
  group: nightly
  cancel-in-progress: false  # Never cancel an in-progress scan

# Opt into Node.js 24 now to avoid forced migration noise in June 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # Up to 2 h budget; accuracy matters more than speed
    permissions:
      contents: write  # Required to commit updated data.json

    steps:
      # SHA-pinned to actions/checkout@v4
      # https://github.com/actions/checkout/releases/tag/v4
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned to astral-sh/setup-uv@v5
      # https://github.com/astral-sh/setup-uv/releases/tag/v5
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.13

      - run: uv sync

      # Phase 2: Scan certificates (municipality_domains.json must exist)
      #
      # Tuning for GitHub Actions (Azure, US West) → Nordic/Baltic servers:
      #
      # --concurrency 15
      #   Low enough that crt.sh is never rate-limited from the CI IP range.
      #   The 2026-03-26 nightly showed 'stamina.retry_scheduled' storms when
      #   running at concurrency 30 with CT enabled — scan rate fell from
      #   ~6 dom/s to ~2.3 dom/s and 195 fewer municipalities were classified.
      #
      # --timeout 25
      #   GitHub Actions runs in Azure (US West); round-trip to Nordic servers
      #   is ~150-200 ms vs ~20 ms from Finland. The extra 10 s window catches
      #   servers that would time out at 15 s from CI but succeed from a local
      #   developer machine.
      #
      # CT enabled (no --skip-ct)
      #   Accuracy over speed. With concurrency 15 and no rate-limit pressure,
      #   crt.sh historical data adds CT log signals for borderline cases.
      #   Expected total run time: ~25-35 minutes (well within 120 min budget).
      - name: Scan TLS certificates
        run: uv run scan-certs --concurrency 15 --timeout 25

      - name: Run analysis report
        run: uv run analyze
        continue-on-error: true

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Commit updated scan data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.min.json
          git diff --staged --quiet || git commit -m "Update CA scan data [${{ steps.date.outputs.date }}]"
          git push
